# ──────────────────────────────────────────────────────────────
# Deploy a GitHub Pages
# Inyecta la URL de la API en index.html y publica la carpeta src/
# ──────────────────────────────────────────────────────────────

name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Permite ejecución manual desde Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un deployment a la vez
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject API URL into index.html
        env:
          API_URL: "https://insurance-crm-backend-f5yw.onrender.com/api/v1"
        run: |
          python inject_api.py "${API_URL}"
          
          # Verificamos que se inyectó correctamente
          grep -n "__API_URL__" src/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4